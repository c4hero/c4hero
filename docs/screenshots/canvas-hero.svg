<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 540" role="img" aria-label="c4hero canvas preview — architecture diagram with system, containers, and a person">
  <defs>
    <linearGradient id="bg" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="boundary" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#79b8ff" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#79b8ff" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="edge" x1="0" x2="1">
      <stop offset="0" stop-color="#79b8ff" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#79b8ff" stop-opacity="0.2"/>
    </linearGradient>
    <pattern id="dots" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="0.8" fill="#30363d"/>
    </pattern>
  </defs>

  <rect width="1200" height="540" fill="url(#bg)"/>
  <rect width="1200" height="540" fill="url(#dots)"/>

  <!-- Top pill chrome -->
  <g transform="translate(220, 18)">
    <rect width="760" height="44" rx="10" fill="#161b22" stroke="#30363d"/>
    <circle cx="22" cy="22" r="6" fill="#79b8ff" opacity="0.85"/>
    <text x="40" y="27" fill="#c9d1d9" font-family="Inter, sans-serif" font-size="13" font-weight="600">E-Commerce Platform</text>
    <text x="200" y="27" fill="#8b949e" font-family="Inter, sans-serif" font-size="12">Containers</text>
    <text x="700" y="27" fill="#8b949e" font-family="Inter, sans-serif" font-size="11" text-anchor="end">v0.1.0</text>
  </g>

  <!-- Left tool rail -->
  <g transform="translate(20, 90)">
    <rect width="44" height="320" rx="10" fill="#161b22" stroke="#30363d"/>
    <g fill="#8b949e">
      <rect x="13" y="18" width="18" height="2" rx="1"/>
      <rect x="13" y="26" width="18" height="2" rx="1"/>
      <rect x="13" y="34" width="18" height="2" rx="1"/>
    </g>
    <circle cx="22" cy="80" r="6" fill="none" stroke="#8b949e" stroke-width="1.5"/>
    <circle cx="22" cy="120" r="6" fill="none" stroke="#8b949e" stroke-width="1.5"/>
    <circle cx="22" cy="160" r="6" fill="none" stroke="#8b949e" stroke-width="1.5"/>
    <circle cx="22" cy="200" r="6" fill="none" stroke="#79b8ff" stroke-width="1.5"/>
  </g>

  <!-- Boundary -->
  <g transform="translate(220, 110)">
    <rect width="780" height="380" rx="12" fill="none" stroke="url(#boundary)" stroke-width="1.5" stroke-dasharray="6 6"/>
    <text x="20" y="28" fill="#79b8ff" font-family="Inter, sans-serif" font-size="12" font-weight="700" letter-spacing="0.04em">SOFTWARE SYSTEM</text>
    <text x="20" y="46" fill="#c9d1d9" font-family="Inter, sans-serif" font-size="14" font-weight="600">E-Commerce Platform</text>
  </g>

  <!-- Person (Customer) -->
  <g transform="translate(80, 250)">
    <circle cx="40" cy="-22" r="18" fill="#161b22" stroke="#79b8ff" stroke-width="1.5"/>
    <rect x="0" y="0" width="120" height="80" rx="12" fill="#161b22" stroke="#79b8ff" stroke-width="1.5"/>
    <text x="60" y="26" fill="#c9d1d9" font-family="Inter, sans-serif" font-size="13" font-weight="600" text-anchor="middle">Customer</text>
    <text x="60" y="44" fill="#8b949e" font-family="Inter, sans-serif" font-size="11" text-anchor="middle">Person</text>
    <text x="60" y="62" fill="#8b949e" font-family="Inter, sans-serif" font-size="10" text-anchor="middle">Browses + buys</text>
  </g>

  <!-- API Gateway -->
  <g transform="translate(280, 200)">
    <rect width="180" height="90" rx="10" fill="#161b22" stroke="#79b8ff" stroke-width="1.5"/>
    <text x="90" y="28" fill="#c9d1d9" font-family="Inter, sans-serif" font-size="13" font-weight="600" text-anchor="middle">API Gateway</text>
    <text x="90" y="46" fill="#8b949e" font-family="Inter, sans-serif" font-size="10" text-anchor="middle">[Container: Node.js]</text>
    <text x="90" y="68" fill="#8b949e" font-family="Inter, sans-serif" font-size="10" text-anchor="middle">Routes + auth</text>
  </g>

  <!-- User Service -->
  <g transform="translate(540, 150)">
    <rect width="180" height="90" rx="10" fill="#161b22" stroke="#79b8ff" stroke-width="1.5"/>
    <text x="90" y="28" fill="#c9d1d9" font-family="Inter, sans-serif" font-size="13" font-weight="600" text-anchor="middle">User Service</text>
    <text x="90" y="46" fill="#8b949e" font-family="Inter, sans-serif" font-size="10" text-anchor="middle">[Container: Spring Boot]</text>
    <text x="90" y="68" fill="#8b949e" font-family="Inter, sans-serif" font-size="10" text-anchor="middle">Accounts + profiles</text>
  </g>

  <!-- Order Service -->
  <g transform="translate(540, 280)">
    <rect width="180" height="90" rx="10" fill="#161b22" stroke="#79b8ff" stroke-width="1.5"/>
    <text x="90" y="28" fill="#c9d1d9" font-family="Inter, sans-serif" font-size="13" font-weight="600" text-anchor="middle">Order Service</text>
    <text x="90" y="46" fill="#8b949e" font-family="Inter, sans-serif" font-size="10" text-anchor="middle">[Container: Go]</text>
    <text x="90" y="68" fill="#8b949e" font-family="Inter, sans-serif" font-size="10" text-anchor="middle">Cart + checkout</text>
  </g>

  <!-- Postgres -->
  <g transform="translate(800, 150)">
    <rect width="160" height="90" rx="10" fill="#161b22" stroke="#79b8ff" stroke-width="1.5"/>
    <text x="80" y="28" fill="#c9d1d9" font-family="Inter, sans-serif" font-size="13" font-weight="600" text-anchor="middle">Postgres</text>
    <text x="80" y="46" fill="#8b949e" font-family="Inter, sans-serif" font-size="10" text-anchor="middle">[Container: Database]</text>
    <text x="80" y="68" fill="#8b949e" font-family="Inter, sans-serif" font-size="10" text-anchor="middle">Users + orders</text>
  </g>

  <!-- Edges -->
  <g stroke="url(#edge)" stroke-width="1.6" fill="none">
    <path d="M200 280 Q 240 250 280 245" marker-end="url(#arrow)"/>
    <path d="M460 230 L 540 195" marker-end="url(#arrow)"/>
    <path d="M460 270 L 540 320" marker-end="url(#arrow)"/>
    <path d="M720 195 L 800 195" marker-end="url(#arrow)"/>
    <path d="M720 320 Q 770 280 800 230" marker-end="url(#arrow)"/>
  </g>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#79b8ff" opacity="0.85"/>
    </marker>
  </defs>

  <!-- Footer hash -->
  <text x="1180" y="525" fill="#484f58" font-family="ui-monospace, monospace" font-size="10" text-anchor="end">v0.1.0 · c4hero.com</text>
</svg>
